<!DOCTYPE html>
<html>

<body style="font-family:Arial;text-align:center;margin-top:60px">

<h1>Lesson 8 Pronunciation</h1>

<div id="word" style="font-size:70px;margin:30px"></div>

<img id="wordImage" style="width:300px;margin:20px">

<br>

<button onclick="speak()" style="font-size:30px;margin:10px">🔊 Listen</button>

<button onclick="record()" style="font-size:30px;margin:10px">🎤 Speak</button>

<div id="result" style="font-size:40px;margin-top:30px"></div>

<script>

let words=[
"act","ants","ant","boat","coat","coast","boast","toast",
"bacon","basic","tonic","sonic","attic",
"static","action","station","antibiotics","botanist",
"titanic","roast","picnic","fiction","friction"
]

let images=[
"https://picsum.photos/400?random=1",
"https://picsum.photos/400?random=2",
"https://picsum.photos/400?random=3",
"https://picsum.photos/400?random=4",
"https://picsum.photos/400?random=5",
"https://picsum.photos/400?random=6",
"https://picsum.photos/400?random=7",
"https://picsum.photos/400?random=8",
"https://picsum.photos/400?random=9",
"https://picsum.photos/400?random=10",
"https://picsum.photos/400?random=11",
"https://picsum.photos/400?random=12",
"https://picsum.photos/400?random=13",
"https://picsum.photos/400?random=14",
"https://picsum.photos/400?random=15",
"https://picsum.photos/400?random=16",
"https://picsum.photos/400?random=17",
"https://picsum.photos/400?random=18",
"https://picsum.photos/400?random=19",
"https://picsum.photos/400?random=20",
"https://picsum.photos/400?random=21",
"https://picsum.photos/400?random=22",
"https://picsum.photos/400?random=23"
]

let index=0

function showWord(){

document.getElementById("word").innerText=words[index]

document.getElementById("wordImage").src=images[index]

document.getElementById("result").innerText=""

}

function speak(){

let utter=new SpeechSynthesisUtterance(words[index])

utter.lang="en-US"

speechSynthesis.speak(utter)

}

function record(){

let recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

recognition.lang="en-US"

recognition.start()

recognition.onresult=function(event){

let spoken=event.results[0][0].transcript.toLowerCase()

if(spoken.includes(words[index])){

document.getElementById("result").innerText="Great!"

index++

if(index>=words.length){

document.getElementById("word").innerText="Finished!"

document.getElementById("wordImage").style.display="none"

return

}

setTimeout(showWord,1000)

}else{

document.getElementById("result").innerText="Try Again"

}

}

}

showWord()

</script>

</body>
</html>
